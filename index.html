<!DOCTYPE html>
<html>
<head>
    <title>Welcome - Class Site</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: black;
        }
        .container {
            text-align: center;
            background: white;
            padding: 12px;
            border-radius: 20px;
            box-shadow: 0 4rem 6rem rgba(0, 0, 0, 0.1);
        }
        h1 {
            color: #333;
        }
        p {
            color: #666;
            font-size: 18px;
        }
        a {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 30px;
            background-color: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 16px;
        }
        a:hover {
            background-color: #764ba2;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to the form</h1>
        <p>Enter the password to access the main page</p>
        
        <label for="text">Password:</label>
        <textarea id="text"></textarea>
        
        <button id="MYE">Submit</button>
        
        <script>
            document.getElementById("MYE").onclick = function(){
                let password = document.getElementById("text").value;
                console.log(password);
                if(password == "fXZ"){
                    alert("correct!")
                    window.location.href = "a6-main hub.html";
                }
                else {
                    alert("WRONG PASSWORD!!")
                }
            }
        </script>
    </div>
</body>
</html>
